name: Smart Output Manager

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Prepare output structure
      run: |
        # 清空产出目录（完全覆盖）
        rm -rf output/*
        mkdir -p output/{data,logs,backups}
        
        # 创建本次运行的元数据
        echo "{\"timestamp\": \"$(date -Iseconds)\", \"workflow\": \"$GITHUB_RUN_ID\"}" > output/meta.json
        echo "🗂️ 产出目录结构已初始化"
        
    - name: Run processing script
      run: |
        npm install
        # 假设脚本支持输出目录参数
        node fetchURLByAndroid720p.js --output-dir ./output/data --log-dir ./output/logs
        
    - name: Create backup of previous run
      run: |
        # 如果有上一次运行，创建备份
        if [ -f "output/data/urls.json" ]; then
          BACKUP_DIR="output/backups/$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          cp output/data/* "$BACKUP_DIR/" 2>/dev/null || true
          echo "📦 创建备份: $BACKUP_DIR"
        fi
        
    - name: Validate and summarize output
      run: |
        echo "## 📊 产出文件统计" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # 统计各类文件
        JSON_COUNT=$(find output/data -name "*.json" | wc -l)
        TXT_COUNT=$(find output/data -name "*.txt" | wc -l)
        TOTAL_SIZE=$(du -sh output/data | cut -f1)
        
        echo "| 文件类型 | 数量 | 总大小 |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| JSON 文件 | $JSON_COUNT 个 | - |" >> $GITHUB_STEP_SUMMARY
        echo "| 文本文件 | $TXT_COUNT 个 | - |" >> $GITHUB_STEP_SUMMARY
        echo "| **总计** | **$((JSON_COUNT + TXT_COUNT))** 个 | **$TOTAL_SIZE** |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # 列出具体文件
        echo "### 📁 生成的文件列表" >> $GITHUB_STEP_SUMMARY
        find output/data -type f | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
        
    - name: Auto-commit output
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 只提交output目录
        git add output/
        
        if git diff --staged --quiet; then
          echo "🟡 产出文件无变化"
        else
          git commit -m "🎯 Update output files - $(date +'%Y-%m-%d %H:%M')"
          git push
          echo "✅ 产出文件已覆盖更新"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
