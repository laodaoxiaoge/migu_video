name: Migu Video Fetcher (Fixed)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次

jobs:
  fetch-channels:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'package.json'
        
    - name: Install dependencies
      run: npm install axios
        
    - name: Create output directory
      run: mkdir -p output
      
    - name: Run simplified fetcher
      run: node scripts/simple-fetcher.js
      
    - name: Check results
      run: |
        echo "📊 生成的文件:"
        ls -la output/ || echo "无输出目录"
        find . -name "*.m3u" -o -name "*.txt" 2>/dev/null | head -10 || echo "无M3U文件"
        
    - name: Commit if changes
      if: success()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add output/ || echo "无文件可添加"
        git diff --cached --quiet || (git commit -m "📺 更新频道列表 $(date +'%Y-%m-%d')" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
