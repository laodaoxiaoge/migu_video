name: Migu Video Fetcher (Real URLs)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch-channels:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install axios
      
    - name: Create directories
      run: mkdir -p output scripts
      
    - name: Run real URL fetcher
      run: node scripts/fetchURLByAndroid720p.js
      
    - name: Check results
      run: |
        echo "📊 生成结果:"
        if [ -f "output/channels.m3u" ]; then
          echo "✅ M3U文件已生成"
          echo "📄 文件预览:"
          head -10 output/channels.m3u
          echo ""
          echo "🔗 链接数量: $(grep -c '^https://' output/channels.m3u || echo 0)"
        else
          echo "❌ 未生成M3U文件"
        fi
        
    - name: Commit results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add output/
        git diff --cached --quiet || (git commit -m "📺 更新真实播放链接 $(date +'%Y-%m-%d %H:%M')" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
