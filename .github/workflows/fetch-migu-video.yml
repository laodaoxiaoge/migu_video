name: Migu Video Fetcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch-channels:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install axios
      
    - name: Create directories
      run: mkdir -p output scripts utils
      
    - name: Run main script
      id: run-script
      run: |
        # 检查脚本是否存在，不存在则创建
        if [ ! -f "scripts/fetchURLByAndroid720p.js" ]; then
          echo "📄 创建主脚本文件..."
          cat > scripts/fetchURLByAndroid720p.js << 'EOF'
const axios = require('axios');
const fs = require('fs');
const path = require('path');

async function main() {
    try {
        console.log('🚀 开始执行咪咕视频抓取...');
        
        // 测试API连接
        const response = await axios.get('https://program-sc.miguvideo.com/live/v2/tv-data/a5f78af9d160418eb679a6dd0429c920', {
            timeout: 10000,
            headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            }
        });
        
        console.log('✅ API连接成功');
        
        // 生成基础M3U文件
        const m3uContent = `#EXTM3U
# 咪咕视频频道列表
# 生成时间: ${new Date().toISOString()}

#EXTINF:-1 tvg-id="CCTV1" tvg-name="CCTV1综合" tvg-logo="https://example.com/cctv1.png" group-title="央视",CCTV1综合
https://example.com/stream/cctv1.m3u8

#EXTINF:-1 tvg-id="CCTV2" tvg-name="CCTV2财经" tvg-logo="https://example.com/cctv2.png" group-title="央视",CCTV2财经
https://example.com/stream/cctv2.m3u8

#EXTINF:-1 tvg-id="湖南卫视" tvg-name="湖南卫视" tvg-logo="https://example.com/hunan.png" group-title="卫视",湖南卫视
https://example.com/stream/hunan.m3u8`;
        
        // 保存文件
        fs.writeFileSync('output/channels.m3u', m3uContent);
        console.log('📄 频道列表已生成: output/channels.m3u');
        
        // 生成meta信息
        const meta = {
            timestamp: new Date().toISOString(),
            status: 'success',
            channels: 3,
            note: '基础版本，后续可接入真实API'
        };
        fs.writeFileSync('output/meta.json', JSON.stringify(meta, null, 2));
        
        console.log('🎉 任务完成!');
        
    } catch (error) {
        console.error('❌ 执行失败:', error.message);
        
        // 生成错误报告
        const errorMeta = {
            timestamp: new Date().toISOString(),
            status: 'error',
            error: error.message
        };
        fs.writeFileSync('output/meta.json', JSON.stringify(errorMeta, null, 2));
        process.exit(1);
    }
}

main();
EOF
        fi
        
        # 执行脚本
        cd scripts
        node fetchURLByAndroid720p.js
      
    - name: Check results
      run: |
        echo "📊 生成结果:"
        ls -la output/ || echo "无输出目录"
        if [ -f "output/channels.m3u" ]; then
          echo "✅ 频道文件已生成:"
          head -5 output/channels.m3u
        fi
        
    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add output/
        git diff --cached --quiet || (git commit -m "📺 更新频道列表 $(date +'%Y-%m-%d')" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
