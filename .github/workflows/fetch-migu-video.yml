name: Migu Video Fetcher (Fixed)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时执行一次

jobs:
  fetch-channels:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'scripts/package.json'
        
    - name: Install dependencies
      run: |
        cd scripts
        npm install
        
    - name: Create output directory
      run: mkdir -p output
      
    - name: Run fixed fetcher script
      run: |
        cd scripts
        node migu-fetcher.js
      
    - name: Check generated files
      run: |
        echo "📁 生成的文件列表:"
        find output -type f -name "*.m3u" -o -name "*.xml" -o -name "*.json" | while read file; do
          echo "📄 $file: $(wc -l < "$file") 行, $(du -h "$file" | cut -f1)"
        done
        
        echo ""
        echo "📊 M3U文件预览:"
        head -5 output/channels.m3u || echo "无M3U文件"
        
    - name: Commit and push results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add output/
        git diff --cached --quiet || (git commit -m "📺 更新频道列表 - $(date +'%Y-%m-%d %H:%M')" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
